name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Pytest
        run: pytest tests/ -q
      - name: Ruff
        run: ruff check acg/ tests/ benchmark/

  viz:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: viz/package-lock.json
      - name: Install
        working-directory: viz
        run: npm ci
      - name: Typecheck
        working-directory: viz
        run: npx tsc --noEmit
      - name: Build
        working-directory: viz
        run: npm run build
